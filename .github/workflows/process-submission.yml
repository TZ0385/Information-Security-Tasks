name: Process Resource Submission

on:
  issues:
    types: [opened, reopened]

permissions:
  contents: write
  issues: write

jobs:
  process:
    if: contains(github.event.issue.labels.*.name, 'resource-submission')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Parse and append resource
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        run: python3 scripts/process_submission.py

      - name: Commit resource
        run: |
          git config user.name  "InfoSec Tasks Bot"
          git config user.email "vickytestssec@gmail.com"
          git add resources/
          git diff --cached --quiet && echo "Nothing to add" && exit 0
          git commit -m "feat: add community resource from issue #${ISSUE_NUMBER} [skip ci]"
          git push

      - name: Close issue with comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "✅ Resource added to the repo. Thank you for contributing!"
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: "closed"
            });
