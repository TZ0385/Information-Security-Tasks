name: Daily InfoSec Digest

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC every day
  workflow_dispatch:        # manual trigger from Actions tab

permissions:
  contents: write

jobs:
  build-digest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate daily digest
        run: python3 scripts/daily_feed.py

      - name: Commit digest
        run: |
          git config user.name  "InfoSec Tasks Bot"
          git config user.email "vickytestssec@gmail.com"
          DATE=$(date -u +%Y-%m-%d)
          git add feeds/${DATE}.md
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: daily digest ${DATE} [skip ci]"
          git push
